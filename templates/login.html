<!DOCTYPE html> <!-- объявление HTML5 -->
<html> <!-- корень документа -->
<head> <!-- служебная секция -->
    <title>Login</title> <!-- заголовок вкладки: «Вход» -->
    <link rel="stylesheet" href="/static/style.css"> <!-- подключение CSS-стилей -->
</head>
<body> <!-- тело страницы -->

<div class="container"> <!-- центрированный блок -->

    <h2>Login</h2> <!-- заголовок «Вход» -->

    <form method="POST" action="/login"> <!-- form — форма; method=POST — отправка данных методом POST; action=/login — URL обработчика -->
        <input name="login" placeholder="Login" required> <!-- input — поле ввода; name=login — имя поля для сервера; placeholder — подсказка; required — обязательное -->
        <input name="password" type="password" placeholder="Password" required> <!-- type=password — скрывает символы пароля -->
        <button type="submit">Login</button> <!-- button — кнопка; type=submit — отправляет форму -->
    </form> <!-- закрытие формы -->

    <div class="nav"> <!-- навигация -->
        <a href="/">Home</a> <!-- главная -->
        <a href="/register">Register</a> <!-- регистрация -->
    </div>

</div>

</body>
</html>
